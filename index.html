<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Bands</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f0;
      font-family: monospace;
      padding: 60px 40px;
    }

    h1 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #999;
      margin-bottom: 40px;
    }

    ul {
      list-style: none;
      border-top: 2px solid #000;
    }

    li {
      font-size: 48px;
      font-weight: 700;
      padding: 24px 0;
      border-bottom: 2px solid #000;
      color: #000;
    }
  </style>
</head>
<body>

  <h1>Best Bands in the World</h1>

  <ul>
    <li>White Stripes</li>
    <li>Radiohead</li>
    <li>Depeche Mode</li>
    <li>The Beatles</li>
  </ul>

</body>
</html>
